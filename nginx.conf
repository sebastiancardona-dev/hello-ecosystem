server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;

    # Shared ecosystem contract: /health gates deploys, /info feeds the Portal (project 06)
    location = /health {
        default_type application/json;
        return 500 '{"status":"broken"}';
    }

    location = /info {
        default_type application/json;
        alias /usr/share/nginx/html/info.json;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
