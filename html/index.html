<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hello-ecosystem</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: #0d1117; color: #e6edf3;
      font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
    }
    main { text-align: center; padding: 2rem; }
    h1 { font-size: 1.6rem; font-weight: 600; letter-spacing: .02em; }
    h1::before { content: "▲ "; color: #3fb950; }
    p { color: #8b949e; max-width: 42ch; line-height: 1.6; }
    dl {
      display: grid; grid-template-columns: auto auto; gap: .35rem 1rem;
      justify-content: center; text-align: left; margin-top: 2rem; font-size: .9rem;
    }
    dt { color: #8b949e; } dd { margin: 0; color: #79c0ff; }
    a { color: #79c0ff; }
  </style>
</head>
<body>
  <main>
    <p style="border:1px dashed #d29922;color:#d29922;padding:.5rem 1rem;max-width:max-content;margin:0 auto 1rem">
      🧪 TESTING ENV — branch build, throwaway by design</p>
    <h1>hello-ecosystem</h1>
    <p>Pilot app of the <a href="https://sebastiancardona.dev">sebastiancardona.dev</a> ecosystem.
       Every pixel here shipped through the tag→deploy pipeline: GitHub Actions → GHCR →
       health-gated deploy with auto-rollback.</p>
    <dl id="info"><dt>version</dt><dd>…</dd></dl>
  </main>
  <script>
    fetch("/info").then(r => r.json()).then(i => {
      document.getElementById("info").innerHTML =
        ["version", "git_sha", "build_time"]
          .map(k => `<dt>${k}</dt><dd>${String(i[k]).slice(0, 24)}</dd>`).join("");
    }).catch(() => {});
  </script>
</body>
</html>
